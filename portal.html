<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>stonks</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    body {
        font-family: 'Crimson Text', Georgia, serif;
        background-color: #ffffff;
        color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        margin: 0;
        text-align: center;
    }

    h2 { font-size: 2.2em; margin: 10px 0; font-weight: bold; }
    .subtitle { font-size: 1.2em; margin-bottom: 30px; }

    .nav-links { margin-bottom: 30px; }
    .nav-links a, .nav-links button {
        background: none;
        border: none;
        color: #000;
        font-family: inherit;
        font-size: 1.1em;
        cursor: pointer;
        padding: 0 10px;
        text-decoration: underline;
    }

    .tab-content {
        width: 100%;
        max-width: 820px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    form {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 420px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: row;
        align-items: center;
        width: 100%;
        gap: 15px;
        margin-bottom: 15px;
    }

    .form-group label {
        font-weight: bold;
        width: 80px;
        min-width: 80px;
        text-align: right;
        margin: 0;
    }

    .form-group select {
        flex: 1;
        max-width: 300px;
        font-family: inherit;
        font-size: 1em;
        padding: 8px 12px;
        border: 1px solid #000;
        border-radius: 5px;
        background: #fff;
        color: #000;
        box-sizing: border-box;
    }

    button[type="submit"] {
        font-family: inherit;
        font-size: 1.1em;
        padding: 10px 12px;
        border: 1px solid #000;
        border-radius: 5px;
        background: #fff;
        color: #000;
        width: 100%;
        cursor: pointer;
        margin-top: 10px;
        font-weight: bold;
    }

    button[type="submit"]:hover { background: #f0f0f0; }

    /* stock card */
    .stock-card {
        width: 100%;
        border: 1px solid #000;
        border-radius: 10px;
        padding: 20px 25px;
        text-align: left;
        box-sizing: border-box;
        margin-bottom: 16px;
    }

    .stock-card .exchange-label { font-size: 0.85em; color: #777; }
    .stock-card .stock-name { font-size: 1.5em; font-weight: bold; margin: 4px 0 8px; }
    .stock-card .stock-price { font-size: 2.4em; font-weight: bold; }
    .stock-card .stock-currency { font-size: 0.45em; font-weight: normal; }
    .stock-card .stock-change { font-size: 1.1em; margin-top: 4px; }
    .stock-card .stock-details {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 14px;
        font-size: 0.95em;
        border-top: 1px solid #eee;
        padding-top: 12px;
    }
    .stock-card .detail-item label {
        color: #888;
        font-size: 0.8em;
        display: block;
        margin-bottom: 2px;
        font-weight: normal;
        text-align: left;
    }

    .positive { color: #2a7a2a; }
    .negative { color: #b00000; }

    /* price chart */
    .chart-box {
        width: 100%;
        border: 1px solid #000;
        border-radius: 10px;
        padding: 16px 20px;
        box-sizing: border-box;
        margin-bottom: 16px;
        text-align: left;
    }

    .range-buttons { margin-bottom: 12px; }
    .range-buttons button {
        font-family: inherit;
        font-size: 0.85em;
        padding: 3px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
        margin-right: 4px;
    }
    .range-buttons button.active {
        background: #000;
        color: #fff;
        border-color: #000;
    }

    /* market cards */
    .market-card {
        width: 100%;
        border: 1px solid #000;
        border-radius: 10px;
        padding: 20px 25px;
        text-align: left;
        box-sizing: border-box;
        margin-bottom: 16px;
    }

    .market-card .index-label { font-size: 0.85em; color: #777; }
    .market-card .index-value { font-size: 2.6em; font-weight: bold; line-height: 1.1; }
    .market-card .index-change { font-size: 1.1em; margin: 6px 0 14px; }
    .market-card .index-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        font-size: 0.95em;
    }
    .market-card .index-stats label {
        color: #888;
        font-size: 0.8em;
        display: block;
        margin-bottom: 2px;
        font-weight: normal;
    }

    .status-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 0.75em;
        font-weight: bold;
        vertical-align: middle;
        margin-left: 8px;
    }
    .status-open   { background: #e7f5e7; color: #2a7a2a; }
    .status-closed { background: #fdeaea; color: #b00000; }

    .mini-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        margin-bottom: 12px;
    }

    .mini-card {
        border: 1px solid #000;
        border-radius: 8px;
        padding: 14px 16px;
        text-align: left;
    }

    .mini-card h4 { margin: 0 0 10px; font-size: 1em; font-weight: bold; }

    .mini-card .mini-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 0.9em;
        padding: 4px 0;
        border-bottom: 1px solid #f0f0f0;
    }
    .mini-card .mini-row:last-child { border-bottom: none; }
    .mini-card .mini-row .mini-value { font-weight: bold; }
    .mini-card .mini-row .mini-change { font-size: 0.8em; margin-left: 6px; }

    /* agenda */
    .agenda-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95em; }
    .agenda-table th { border-bottom: 2px solid #000; padding: 8px 12px; font-weight: bold; }
    .agenda-table td { border-bottom: 1px solid #e0e0e0; padding: 8px 12px; }

    .status-text { color: #777; font-style: italic; }
</style>
</head>
<body>

<h2>stonks</h2>
<div class="subtitle">african stock exchange aggregator</div>

<div class="nav-links">
    <a href="/docs" target="_blank">API Docs</a> |
    <button type="button" onclick="switchTab('lookup')">Stock Lookup</button> |
    <button type="button" onclick="switchTab('market')">Market</button> |
    <button type="button" onclick="switchTab('agenda')">Agenda</button>
</div>

<!-- stock lookup tab -->
<div id="lookup" class="tab-content">
    <form id="lookupForm">
        <div class="form-group">
            <label for="exchange">Exchange:</label>
            <select id="exchange" onchange="loadSymbols()">
                <option value="brvm">BRVM - West Africa</option>
                <option value="cse">CSE - Casablanca</option>
                <option value="ngx">NGX - Nigeria</option>
            </select>
        </div>
        <div class="form-group">
            <label for="symbol">Symbol:</label>
            <select id="symbol">
                <option value="">loading...</option>
            </select>
        </div>
        <button type="submit">Look Up</button>
    </form>

    <div id="lookupStatus" class="status-text"></div>

    <div id="stockResult" style="display:none; width:100%">
        <div id="stockCard" class="stock-card"></div>
        <div id="chartBox" class="chart-box" style="display:none">
            <div class="range-buttons" id="rangeButtons"></div>
            <canvas id="priceChart"></canvas>
        </div>
    </div>
</div>

<!-- market tab -->
<div id="market" class="tab-content" style="display:none">
    <form id="marketForm">
        <div class="form-group">
            <label for="mexchange">Exchange:</label>
            <select id="mexchange" onchange="loadMarket()">
                <option value="cse">CSE - Casablanca</option>
                <option value="brvm">BRVM - West Africa</option>
            </select>
        </div>
    </form>

    <div id="marketContent" style="width:100%">
        <div class="status-text">loading...</div>
    </div>
</div>

<!-- agenda tab (CSE only for now) -->
<div id="agenda" class="tab-content" style="display:none">
    <div id="agendaContent" style="width:100%">
        <div class="status-text">loading...</div>
    </div>
</div>

<script>
    const exchangeConfig = {
        brvm: { listUrl: '/brvm/', key: 'stocks', symField: 'symbol', nameField: 'name' },
        cse: { listUrl: '/cse/', key: 'stocks', symField: 'symbol', nameField: 'name' },
        ngx: { listUrl: '/ngx/', key: 'stocks', symField: 'symbol', nameField: 'name' },
    };

    async function loadSymbols() {
        const exchange = document.getElementById('exchange').value;
        const config = exchangeConfig[exchange];
        const symbolSelect = document.getElementById('symbol');

        symbolSelect.innerHTML = '<option value="">loading...</option>';

        try {
            const r = await fetch(config.listUrl);
            const d = await r.json();
            const stocks = d[config.key] || [];

            symbolSelect.innerHTML = stocks.map(function(s) {
                const label = s[config.nameField]
                    ? s[config.symField] + ' - ' + s[config.nameField]
                    : s[config.symField];
                return `<option value="${s[config.symField]}">${label}</option>`;
            }).join('');
        } catch (err) {
            symbolSelect.innerHTML = '<option value="">error loading symbols</option>';
        }
    }

    function switchTab(tab) {
        document.getElementById('lookup').style.display = tab === 'lookup' ? 'flex' : 'none';
        document.getElementById('market').style.display = tab === 'market' ? 'flex' : 'none';
        document.getElementById('agenda').style.display = tab === 'agenda' ? 'flex' : 'none';

        if (tab === 'market') loadMarket();
        if (tab === 'agenda') loadAgenda();
    }

    // --- stock lookup ---
    // now the same for every exchange since the APIs are unified

    let priceChart = null;
    let fullHistory = [];

    document.getElementById('lookupForm').onsubmit = async function(e) {
        e.preventDefault();

        const exchange = document.getElementById('exchange').value;
        const symbol = document.getElementById('symbol').value;
        if (!symbol) return;

        const statusEl = document.getElementById('lookupStatus');
        const resultEl = document.getElementById('stockResult');
        const chartBox = document.getElementById('chartBox');

        statusEl.textContent = 'loading...';
        resultEl.style.display = 'none';
        chartBox.style.display = 'none';
        fullHistory = [];

        try {
            // live data, same endpoint pattern for all three exchanges now
            const r = await fetch(`/${exchange}/${symbol}`);
            const stock = await r.json();

            renderStockCard(exchange, symbol, stock);
            resultEl.style.display = 'block';
            statusEl.textContent = '';
        } catch (err) {
            statusEl.textContent = 'error: ' + err;
            return;
        }

        // try to load history it works for CSE and BRVM, but silently skips for NGX FOR NOW
        try {
            const histR = await fetch(`/${exchange}/${symbol}/history`);

            if (histR.ok) {
                const histData = await histR.json();

                // CSE returns a raw array, BRVM returns {symbol, count, history: [...]}
                const quotes = Array.isArray(histData) ? histData : (histData.history || []);

                fullHistory = quotes.map(function(entry) {
                    // CSE uses DateCotation + Cloture, BRVM uses date + close
                    const date = entry.date ? new Date(entry.date) : parseCSEDate(entry.DateCotation);
                    const close = entry.close != null ? entry.close : entry.Cloture;
                    return { date: date, close: close };
                }).filter(function(entry) {
                    return entry.date && entry.close != null;
                }).sort(function(a, b) {
                    return a.date - b.date;
                });

                if (fullHistory.length > 0) {
                    setupChart();
                }
            }
        } catch (err) {
            // no history available, chart just stays hidden
        }
    };

    function parseCSEDate(dateStr) {
        // format is "09/06/2023 00:00:00"
        const parts = dateStr.split(' ')[0].split('/');
        return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
    }

    function renderStockCard(exchange, symbol, stock) {
        const changePct = stock.change_pct ?? 0;
        const changeClass = changePct > 0 ? 'positive' : changePct < 0 ? 'negative' : '';
        const changeIcon = changePct > 0
            ? '<i class="fas fa-arrow-up"></i>'
            : changePct < 0
            ? '<i class="fas fa-arrow-down"></i>'
            : '';

        let detailsHtml = '';
        if (stock.open != null) detailsHtml += `<div class="detail-item"><label>Open</label>${fmt(stock.open)}</div>`;
        if (stock.high != null) detailsHtml += `<div class="detail-item"><label>High</label>${fmt(stock.high)}</div>`;
        if (stock.low != null) detailsHtml += `<div class="detail-item"><label>Low</label>${fmt(stock.low)}</div>`;
        if (stock.volume != null) detailsHtml += `<div class="detail-item"><label>Volume</label>${stock.volume.toLocaleString()}</div>`;
        if (stock.market_cap != null) detailsHtml += `<div class="detail-item"><label>Market Cap</label>${fmtCap(stock.market_cap)} ${stock.currency || ''}</div>`;
        if (stock.last_trade) detailsHtml += `<div class="detail-item"><label>Last Trade</label>${stock.last_trade}</div>`;

        document.getElementById('stockCard').innerHTML = `
            <div class="exchange-label">${exchange.toUpperCase()} - ${symbol}</div>
            <div class="stock-name">${stock.name || symbol}</div>
            <div class="stock-price">${fmt(stock.price)} <span class="stock-currency">${stock.currency || ''}</span></div>
            <div class="stock-change ${changeClass}">${changeIcon} ${Math.abs(changePct).toFixed(2)}%</div>
            ${detailsHtml ? `<div class="stock-details">${detailsHtml}</div>` : ''}
        `;
    }

    // --- chart ---

    const chartRanges = { '1M': 30, '3M': 90, '6M': 180, '1Y': 365, 'All': Infinity };

    function setupChart() {
        const chartBox = document.getElementById('chartBox');
        const rangeButtons = document.getElementById('rangeButtons');

        chartBox.style.display = 'block';

        rangeButtons.innerHTML = Object.keys(chartRanges).map(function(range, i) {
            const activeClass = i === 0 ? ' class="active"' : '';
            return `<button${activeClass} onclick="drawChart('${range}')">${range}</button>`;
        }).join('');

        drawChart('1M');
    }

    function drawChart(range) {
        document.querySelectorAll('.range-buttons button').forEach(function(btn) {
            btn.className = btn.textContent === range ? 'active' : '';
        });

        const days = chartRanges[range];
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - days);

        const slice = days === Infinity
            ? fullHistory
            : fullHistory.filter(function(d) { return d.date >= cutoff; });

        const labels = slice.map(function(d) {
            return d.date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' });
        });
        const closes = slice.map(function(d) { return d.close; });

        if (priceChart) priceChart.destroy();

        priceChart = new Chart(document.getElementById('priceChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    data: closes,
                    borderColor: '#000',
                    borderWidth: 1.5,
                    pointRadius: 0,
                    fill: false,
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        ticks: { maxTicksLimit: 8, font: { family: 'Georgia, serif', size: 11 } },
                        grid: { display: false }
                    },
                    y: {
                        ticks: { font: { family: 'Georgia, serif', size: 11 } },
                        grid: { color: '#f0f0f0' }
                    }
                }
            }
        });
    }

    // --- market overview ---

    async function loadMarket() {
        const exchange = document.getElementById('mexchange').value;
        const contentEl = document.getElementById('marketContent');

        contentEl.innerHTML = '<div class="status-text">loading...</div>';

        try {
            if (exchange === 'cse') {
                // fetch everything in parallel
                const [marketData, commodities, metals, currencies, globalIndices] = await Promise.all([
                    fetch('/cse/market').then(r => r.json()),
                    fetch('/cse/commodities').then(r => r.json()),
                    fetch('/cse/metals').then(r => r.json()),
                    fetch('/cse/currencies').then(r => r.json()),
                    fetch('/cse/indices').then(r => r.json()),
                ]);

                contentEl.innerHTML = renderCSEMarket(marketData, commodities, metals, currencies, globalIndices);

            } else if (exchange === 'brvm') {
                const marketData = await fetch('/brvm/market').then(r => r.json());
                contentEl.innerHTML = renderBRVMMarket(marketData);
            }
        } catch (err) {
            contentEl.innerHTML = `<div class="status-text">error: ${err}</div>`;
        }
    }

    function renderCSEMarket(marketData, commodities, metals, currencies, globalIndices) {
        const isOpen = (marketData.status || '').includes('Ouverte');
        const statusBadge = `<span class="status-badge ${isOpen ? 'status-open' : 'status-closed'}">${marketData.status || 'unknown'}</span>`;
        const changePct = marketData.change_pct ?? 0;
        const changeClass = changePct >= 0 ? 'positive' : 'negative';
        const sign = changePct >= 0 ? '+' : '';
        const changeIcon = changePct >= 0
            ? '<i class="fas fa-arrow-up"></i>'
            : '<i class="fas fa-arrow-down"></i>';

        function miniRow(label, value, change) {
            const rowClass = change >= 0 ? 'positive' : 'negative';
            const rowSign = change >= 0 ? '+' : '';
            const rowIcon = change >= 0
                ? '<i class="fas fa-arrow-up"></i>'
                : '<i class="fas fa-arrow-down"></i>';
            return `
                <div class="mini-row">
                    <span>${label}</span>
                    <span>
                        <span class="mini-value">${value}</span>
                        <span class="mini-change ${rowClass}">${rowIcon} ${rowSign}${change?.toFixed(2)}%</span>
                    </span>
                </div>
            `;
        }

        return `
            <div class="market-card">
                <div class="index-label">MASI ${statusBadge}</div>
                <div class="index-value">${fmt(marketData.value)}</div>
                <div class="index-change ${changeClass}">${changeIcon} ${sign}${changePct.toFixed(2)}% &nbsp; ${sign}${marketData.change_val?.toFixed(2)} pts</div>
                <div class="index-stats">
                    <div><label>Open</label>${fmt(marketData.open)}</div>
                    <div><label>Day High</label>${fmt(marketData.high)}</div>
                    <div><label>Day Low</label>${fmt(marketData.low)}</div>
                    <div><label>52w High</label>${fmt(marketData['52w_high'])}</div>
                    <div><label>52w Low</label>${fmt(marketData['52w_low'])}</div>
                    <div><label>Volume (MAD)</label>${fmtCap(marketData.volume)}</div>
                    <div><label>Market Cap</label>${fmtCap(marketData.market_cap)}</div>
                    <div><label>Up / Flat / Down</label>${marketData.advances} / ${marketData.unchanged} / ${marketData.declines}</div>
                </div>
            </div>

            <div class="mini-grid">
                <div class="mini-card">
                    <h4>Commodities</h4>
                    ${commodities.map(c => miniRow(c.Valeur, c.Cours, c.Variation)).join('')}
                </div>
                <div class="mini-card">
                    <h4>Metals</h4>
                    ${metals.map(m => miniRow(m.Valeur, m.Cours, m.Variation)).join('')}
                </div>
                <div class="mini-card">
                    <h4>Currencies</h4>
                    ${currencies.map(c => miniRow(c.Valeur, c.Cours, c.Variation)).join('')}
                </div>
                <div class="mini-card">
                    <h4>Global Indices</h4>
                    ${globalIndices.map(i => miniRow(i.Valeur, i.Cours?.toLocaleString(), i.Variation)).join('')}
                </div>
            </div>
        `;
    }

    function renderBRVMMarket(marketData) {
        // brvmax returns raw data so we don't know the exact field names
        const indexValue = marketData.index_value ?? marketData.value ?? marketData.composite ?? null;
        const changePct = marketData.change_pct ?? marketData.variation ?? null;
        const changeClass = changePct != null ? (changePct >= 0 ? 'positive' : 'negative') : '';
        const changeIcon = changePct != null
            ? (changePct >= 0 ? '<i class="fas fa-arrow-up"></i>' : '<i class="fas fa-arrow-down"></i>')
            : '';

        return `
            <div class="market-card">
                <div class="index-label">BRVM Composite</div>
                <div class="index-value">${indexValue != null ? indexValue.toLocaleString() : 'no data'}</div>
                ${changePct != null ? `<div class="index-change ${changeClass}">${changeIcon} ${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%</div>` : ''}
                <div class="index-stats">
                    ${marketData.volume     != null ? `<div><label>Volume (XOF)</label>${fmtCap(marketData.volume)}</div>` : ''}
                    ${marketData.market_cap != null ? `<div><label>Market Cap</label>${fmtCap(marketData.market_cap)}</div>` : ''}
                    ${marketData.status     != null ? `<div><label>Status</label>${marketData.status}</div>` : ''}
                </div>
            </div>
        `;
    }

    // --- agenda ---

    async function loadAgenda() {
        const contentEl = document.getElementById('agendaContent');
        contentEl.innerHTML = '<div class="status-text">loading...</div>';

        try {
            const r = await fetch('/cse/agenda');
            const events = await r.json();

            if (events.length === 0) {
                contentEl.innerHTML = '<div class="status-text">no upcoming events</div>';
                return;
            }

            const rows = events.map(function(event) {
                const date = event.DateEvenement ? event.DateEvenement.split(' ')[0] : '';
                return `
                    <tr>
                        <td>${date}</td>
                        <td><strong>${event.Symbol}</strong></td>
                        <td>${event.Libelle}</td>
                        <td>${event.Description}</td>
                    </tr>
                `;
            }).join('');

            contentEl.innerHTML = `
                <table class="agenda-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Symbol</th>
                            <th>Company</th>
                            <th>Event</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        } catch (err) {
            contentEl.innerHTML = `<div class="status-text">error: ${err}</div>`;
        }
    }

    // --- helpers ---

    function fmt(n) {
        if (n == null) return 'N/A';
        return n.toLocaleString('fr', { minimumFractionDigits: 2 });
    }

    function fmtCap(n) {
        if (n == null) return 'N/A';
        if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        return n.toLocaleString();
    }

    // load symbols on page open
    loadSymbols();
</script>
</body>
</html>
