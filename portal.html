<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>stonks</title>
<style>
    body {
        font-family: 'Crimson Text', Georgia, serif;
        background-color: #ffffff;
        color: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        margin: 0;
        text-align: center;
    }

    h2 { font-size: 2.2em; margin: 10px 0; font-weight: bold; }
    .subtitle { font-size: 1.2em; margin-bottom: 30px; }

    .nav-links { margin-bottom: 30px; }
    .nav-links a, .nav-links button {
        background: none;
        border: none;
        color: #000;
        font-family: inherit;
        font-size: 1.1em;
        cursor: pointer;
        padding: 0 10px;
        text-decoration: underline;
    }

    .tab-content {
        width: 100%;
        max-width: 800px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    form {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 400px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: row;
        align-items: center;
        width: 100%;
        gap: 15px;
        margin-bottom: 15px;
    }

    .form-group label {
        font-weight: bold;
        width: 80px;
        min-width: 80px;
        text-align: right;
        margin: 0;
    }

    .form-group select,
    .form-group input {
        flex: 1;
        font-family: inherit;
        font-size: 1em;
        padding: 8px 12px;
        border: 1px solid #000;
        border-radius: 5px;
        background: #fff;
        color: #000;
        box-sizing: border-box;
    }

    button[type="submit"] {
        font-family: inherit;
        font-size: 1.1em;
        padding: 10px 12px;
        border: 1px solid #000;
        border-radius: 5px;
        background: #fff;
        color: #000;
        width: 100%;
        cursor: pointer;
        margin-top: 10px;
        font-weight: bold;
    }

    button[type="submit"]:hover { background: #f0f0f0; }

    .results-box {
        display: none;
        width: 100%;
        border: 1px solid #000;
        border-radius: 10px;
        padding: 20px;
        text-align: left;
        box-sizing: border-box;
        overflow-x: auto;
        background: #f9f9f9;
    }

    pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; font-size: 0.85em; }
</style>
</head>
<body>

<h2>stonks</h2>
<div class="subtitle">african stock exchange aggregator</div>

<div class="nav-links">
    <a href="/docs" target="_blank">API Docs</a> |
    <button type="button" onclick="switchTab('lookup')">Stock Lookup</button> |
    <button type="button" onclick="switchTab('market')">Market Overview</button> |
    <button type="button" onclick="switchTab('search')">Search</button>
</div>

<div id="lookup" class="tab-content">
    <form id="lookupForm">
        <div class="form-group">
            <label for="exchange">Exchange:</label>
            <select id="exchange" onchange="loadSymbols()">
                <option value="brvm">BRVM - West Africa</option>
                <option value="cse">CSE - Casablanca</option>
                <option value="ngx">NGX - Nigeria</option>
            </select>
        </div>
        <div class="form-group">
            <label for="symbol">Symbol:</label>
            <select id="symbol">
                <option value="">loading...</option>
            </select>
        </div>
        <button type="submit">Lookup</button>
    </form>
    <div id="lookupResFrame" class="results-box">
        <pre id="lookupRes"></pre>
    </div>
</div>

<div id="market" class="tab-content" style="display:none">
    <form id="marketForm">
        <div class="form-group">
            <label for="mexchange">Exchange:</label>
            <select id="mexchange">
                <option value="brvm">BRVM - West Africa</option>
                <option value="cse">CSE - Casablanca</option>
                <option value="ngx">NGX - Nigeria</option>
            </select>
        </div>
        <button type="submit">Load</button>
    </form>
    <div id="marketResFrame" class="results-box">
        <pre id="marketRes"></pre>
    </div>
</div>

<div id="search" class="tab-content" style="display:none">
    <form id="searchForm">
        <div class="form-group">
            <label for="sq">Query:</label>
            <input id="sq" placeholder="sonatel, ecobank, total..." />
        </div>
        <button type="submit">Search</button>
    </form>
    <div id="searchResFrame" class="results-box">
        <pre id="searchRes"></pre>
    </div>
</div>

<script>
    const exchangeConfig = {
        brvm: { url: '/brvm/', key: 'stocks', sym: 'symbol', name: 'name' },
        cse:  { url: '/cse/', key: 'quotes', sym: 'symbol', name: 'name' },
        ngx:  { url: '/ngx/', key: 'stocks', sym: 'symbol', name: null },
    };

    async function loadSymbols() {
        const ex = document.getElementById('exchange').value;
        const { url, key, sym, name } = exchangeConfig[ex];
        const sel = document.getElementById('symbol');
        sel.innerHTML = '<option value="">loading...</option>';
        try {
            const r = await fetch(url);
            const d = await r.json();
            const items = d[key] || [];
            sel.innerHTML = items.map(s =>
                `<option value="${s[sym]}">${s[sym]}${name && s[name] ? ' - ' + s[name] : ''}</option>`
            ).join('');
        } catch {
            sel.innerHTML = '<option value="">error loading symbols</option>';
        }
    }

    function switchTab(tab) {
        document.getElementById('lookup').style.display = tab === 'lookup' ? 'flex' : 'none';
        document.getElementById('market').style.display = tab === 'market' ? 'flex' : 'none';
        document.getElementById('search').style.display = tab === 'search' ? 'flex' : 'none';
    }

    document.getElementById('lookupForm').onsubmit = async function(e) {
        e.preventDefault();
        const ex = document.getElementById('exchange').value;
        const sym = document.getElementById('symbol').value;
        const frame = document.getElementById('lookupResFrame');
        const pre = document.getElementById('lookupRes');
        frame.style.display = 'block';
        pre.textContent = 'loading...';
        try {
            const url = ex === 'brvm' ? `/brvm/${sym}` : `/${ex}/${sym}`;
            const r = await fetch(url);
            const d = await r.json();
            pre.textContent = JSON.stringify(d, null, 2);
        } catch(err) {
            pre.textContent = 'error: ' + err;
        }
    };

    document.getElementById('marketForm').onsubmit = async function(e) {
        e.preventDefault();
        const ex = document.getElementById('mexchange').value;
        const frame = document.getElementById('marketResFrame');
        const pre = document.getElementById('marketRes');
        frame.style.display = 'block';
        pre.textContent = 'loading...';
        try {
            const url = ex === 'brvm' ? '/brvm/market' : `/${ex}/`;
            const r = await fetch(url);
            const d = await r.json();
            pre.textContent = JSON.stringify(d, null, 2);
        } catch(err) {
            pre.textContent = 'error: ' + err;
        }
    };

    document.getElementById('searchForm').onsubmit = async function(e) {
        e.preventDefault();
        const q = document.getElementById('sq').value.trim();
        const frame = document.getElementById('searchResFrame');
        const pre = document.getElementById('searchRes');

        frame.style.display = 'block';
        pre.textContent = 'searching all exchanges...';

        try {
            const r = await fetch('/search?q=' + q);
            const d = await r.json();
            pre.textContent = JSON.stringify(d, null, 2);
        } catch(err) {
            pre.textContent = 'error: ' + err;
        }
    };

    // load symbols on page open
    loadSymbols();
</script>
</body>
</html>
